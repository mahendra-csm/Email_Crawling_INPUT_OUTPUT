name: Daily Email Crawl

on:
  schedule:
    - cron: '30 21 * * *'   # 21:30 UTC = 3:00 AM IST daily
  workflow_dispatch: {}      # lets you also trigger it manually from the Actions tab

permissions:
  contents: write           # needed so the workflow can commit results back

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: scrapy crawl email_spider

      - name: Archive dated copy of results
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p results/$DATE
          cp extracted_emails.txt results/$DATE/extracted_emails.txt
          cp report.txt results/$DATE/report.txt
          # also keep a "latest" copy at the repo root for convenience
          cp extracted_emails.txt latest_extracted_emails.txt
          cp report.txt latest_report.txt

      - name: Commit and push results
        run: |
          git config user.name "email-crawler-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results/ latest_extracted_emails.txt latest_report.txt
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Daily crawl results: $(date +'%Y-%m-%d')"
          git push

      - name: Count emails found
        id: count
        run: echo "count=$(wc -l < extracted_emails.txt)" >> "$GITHUB_OUTPUT"

      - name: Email the results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.hostinger.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Daily Email Crawl Results - ${{ github.run_id }}"
          to: mahendrabella55@gmail.com
          from: OneGrasp Crawler <support@onegrasp.com>
          body: |
            Daily crawl finished.
            Emails found today: ${{ steps.count.outputs.count }}

            Full results are attached, and also committed to the repo under results/.
          attachments: extracted_emails.txt,report.txt
